<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prekių krepšelis — Sandėliukas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0f1112;
            --surface:  #181c1e;
            --border:   #2a3035;
            --stripe:   #151a1c;
            --accent:   #f5a623;
            --accent2:  #e8380d;
            --text:     #dce3e8;
            --muted:    #5a6672;
            --green:    #2ecc71;
            --red:      #e8380d;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        .hazard-bar {
            height: 6px;
            background: repeating-linear-gradient(
                    -45deg,
                    var(--accent) 0px, var(--accent) 12px,
                    #1a1a1a 12px, #1a1a1a 24px
            );
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 16px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--accent);
            line-height: 1;
        }

        .logo span {
            color: var(--muted);
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 2px;
            display: block;
            margin-top: 2px;
        }

        .header-sep { flex: 1; }

        .header-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 4px 10px;
            letter-spacing: 1px;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 40px 80px;
        }

        .page-title {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .page-title h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 4px;
            color: var(--text);
            line-height: 1;
        }

        .section-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 3px 8px;
            letter-spacing: 2px;
        }

        .flash {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            margin-bottom: 28px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.5px;
            border-left: 3px solid;
            animation: slideIn .3s ease;
        }

        .flash-success { background: rgba(46,204,113,.07); border-color: var(--green); color: var(--green); }
        .flash-error   { background: rgba(232,56,13,.07);  border-color: var(--red);   color: var(--red);   }
        .flash-success::before { content: '✓ '; }
        .flash-error::before   { content: '✕ '; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: var(--muted);
        }

        .empty-icon { font-size: 48px; display: block; margin-bottom: 16px; opacity: .4; }

        .empty-state p {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .cart-table-wrap {
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr { background: var(--surface); }

        thead th {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        thead th:last-child { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        tbody tr:nth-child(odd)  { background: var(--bg); }
        tbody tr:nth-child(even) { background: var(--stripe); }
        tbody tr:hover           { background: #1e2428; }
        tbody tr:last-child      { border-bottom: none; }

        td { padding: 16px 20px; vertical-align: middle; }

        .td-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            width: 60px;
        }

        .td-name { font-weight: 500; }

        .td-price {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            white-space: nowrap;
        }

        .td-subtotal {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
        }

        .td-actions { text-align: right; white-space: nowrap; }

        .qty-group {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: border-color .2s;
        }

        .qty-group:focus-within { border-color: var(--accent); }

        .qty-input {
            width: 58px;
            background: #0d1013;
            color: var(--text);
            border: none;
            padding: 7px 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }

        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .btn-confirm {
            background: #1e2428;
            color: var(--muted);
            border: none;
            border-left: 1px solid var(--border);
            padding: 7px 12px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            transition: background .15s, color .15s;
        }

        .btn-confirm:hover { background: var(--accent); color: #000; }

        .btn-delete {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 7px 14px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            margin-left: 8px;
            transition: background .15s, color .15s, border-color .15s;
        }

        .btn-delete:hover {
            background: rgba(232,56,13,.12);
            color: var(--red);
            border-color: var(--red);
        }

        .cart-footer {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .total-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .total-amount {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 2px;
            color: var(--accent);
            line-height: 1;
        }

        .total-currency { font-size: 20px; opacity: .7; margin-right: 4px; }

        .item-count {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .item-count strong { color: var(--text); }

        .btn-purchase {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            cursor: pointer;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
            transition: transform .1s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }

        .btn-purchase:hover {
            box-shadow: 0 0 32px rgba(245,166,35,.45);
            transform: translateY(-1px);
        }

        .btn-purchase:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="hazard-bar"></div>

<header>
    <div class="logo">
        Sandėliukas
        <span>WAREHOUSE MANAGEMENT SYSTEM</span>
    </div>
    <div class="header-sep"></div>
    <div class="header-badge">WMS v1.0</div>
</header>

<main>

    <div th:if="${success}" class="flash flash-success">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flash flash-error">
        <span th:text="${error}"></span>
    </div>

    <div class="page-title">
        <h1>Prekių krepšelis</h1>
        <span class="section-id">CART-01</span>
    </div>

    <!-- Tuščias krepšelis -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="empty-state">
        <span class="empty-icon">📦</span>
        <p>KREPŠELIS TUŠČIAS — PRIDĖKITE PREKIŲ</p>
    </div>

    <!-- Krepšelio turinys -->
    <div th:unless="${#lists.isEmpty(cartItems)}">

        <div class="cart-table-wrap">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Prekės pavadinimas</th>
                    <th>Vnt. kaina</th>
                    <th>Kiekis</th>
                    <th>Suma</th>
                    <th>Veiksmai</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="td-id" th:text="${item.id}"></td>
                    <td class="td-name" th:text="${item.product.name}"></td>
                    <td class="td-price">
                        <span th:text="${#numbers.formatDecimal(item.product.supplierPrice, 1, 2)}"></span> €
                    </td>
                    <td>
                        <!-- 7. newAmountConfirmButton -->
                        <form th:action="@{/customer/cart/change-amount}" method="post" style="display:inline;">
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <div class="qty-group">
                                <input class="qty-input" type="number" name="newAmount"
                                       min="1" th:value="${item.quantity}">
                                <button class="btn-confirm" type="submit">OK</button>
                            </div>
                        </form>
                    </td>
                    <td class="td-subtotal">
                        <span th:text="${#numbers.formatDecimal(item.product.supplierPrice * item.quantity, 1, 2)}"></span> €
                    </td>
                    <td class="td-actions">
                        <!-- 1. deleteItemButton -->
                        <form th:action="@{/customer/cart/delete}" method="post" style="display:inline;">
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <button class="btn-delete" type="submit">✕ Šalinti</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Footer su suma ir pirkimo mygtuku -->
        <div class="cart-footer">
            <div>
                <span class="total-label">Bendra suma</span>
                <div class="total-amount">
                    <span class="total-currency">€</span><span th:text="${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <span class="item-count">
                    Prekių: <strong th:text="${#lists.size(cartItems)}"></strong>
                </span>
                <!-- 8. purchaseButton → 9. requestPurchase() -->
                <form th:action="@{/customer/cart/reserve}" method="post">
                    <button class="btn-purchase" type="submit">Pirkti →</button>
                </form>
            </div>
        </div>

    </div>

</main>

</body>
</html>
